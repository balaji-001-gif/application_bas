<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Frappe Marketplace</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#595b5d",
                        "on-error-container": "#93000a",

                        "surface-bright": "#f9f9ff",
                        "primary-fixed": "#dae2ff",
                        "on-secondary-container": "#007070",
                        "tertiary-fixed-dim": "#c5c6c8",
                        "primary": "#003d9b",
                        "on-secondary-fixed": "#002020",
                        "outline-variant": "#c3c6d6",
                        "surface-container-highest": "#d7e2ff",
                        "surface-dim": "#cadaff",
                        "on-tertiary-fixed": "#191c1e",
                        "surface-container-low": "#f1f3ff",
                        "on-surface": "#041b3c",
                        "inverse-on-surface": "#edf0ff",
                        "tertiary-fixed": "#e1e2e4",
                        "surface-container": "#e8edff",
                        "secondary-fixed": "#8cf3f3",
                        "on-surface-variant": "#434654",
                        "on-primary": "#ffffff",
                        "surface": "#f9f9ff",
                        "surface-tint": "#0c56d0",
                        "outline": "#737685",

                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#0052cc",
                        "on-primary-fixed-variant": "#0040a2",
                        "on-tertiary-fixed-variant": "#444749"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "2.5rem",
                        "max-width": "1280px",
                        "gutter": "1.5rem",
                        "unit": "4px",
                        "margin": "2rem",
                        "xs": "0.5rem",
                        "xl": "4rem",
                        "sm": "1rem",
                        "md": "1.5rem"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],

                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]

</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex items-center justify-center p-md">
<!-- Global Navigation is suppressed for transactional/login screens per guidelines -->
<!-- Main Content Canvas -->
<main class="w-full max-w-[440px]">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_24px_rgba(23,43,77,0.08)] border border-outline-variant/30 p-lg w-full">
<!-- Header section -->
<div class="flex flex-col items-center justify-center space-y-xs pb-lg text-center">
<div class="h-12 w-12 bg-primary rounded-lg flex items-center justify-center text-on-primary mb-2 shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">hexagon</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Log in to your Frappe Marketplace account to manage apps and licenses.</p>
</div>
<!-- Form section -->
<form class="space-y-md">
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface" for="email">Email address</label>
<input class="w-full h-10 px-sm border border-outline-variant rounded-DEFAULT bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 font-body-sm text-body-sm placeholder:text-outline transition-all duration-200" id="email" placeholder="developer@company.com" required="" type="email"/>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<input class="w-full h-10 px-sm border border-outline-variant rounded-DEFAULT bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 font-body-sm text-body-sm placeholder:text-outline transition-all duration-200" id="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex items-center justify-between pt-xs">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 bg-surface-container-lowest transition-all duration-200 cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">Remember me</label>
</div>
<div class="text-sm">
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors duration-200" href="#">Forgot password?</a>
</div>
</div>
<div class="pt-sm">
<button class="w-full flex justify-center py-2 px-4 border border-transparent rounded-DEFAULT shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors active:opacity-80 transition-all duration-200" type="submit">
                        Sign in
                    </button>
</div>
</form>
<!-- Divider -->
<div class="relative py-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/50"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-container-lowest font-body-sm text-body-sm text-on-surface-variant">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-sm">
<button class="w-full inline-flex justify-center items-center py-2 px-4 border border-outline-variant rounded-DEFAULT bg-surface-container-lowest font-label-md text-label-md text-on-surface hover:bg-surface-container-low transition-colors shadow-sm transition-all duration-200" type="button">
<span class="material-symbols-outlined text-[18px] mr-2">code</span>
                    GitHub
                </button>
<button class="w-full inline-flex justify-center items-center py-2 px-4 border border-outline-variant rounded-DEFAULT bg-surface-container-lowest font-label-md text-label-md text-on-surface hover:bg-surface-container-low transition-colors shadow-sm transition-all duration-200" type="button">
<span class="material-symbols-outlined text-[18px] mr-2">language</span>
                    Google
                </button>
</div>
<!-- Toggle View -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    New to Frappe Marketplace? 
                    <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors ml-1 duration-200" href="/login_sign_up/code">Create an account</a>
</p>
</div>
</div>
<!-- Footer Links for transactional page -->
<div class="mt-lg flex justify-center space-x-md">
<a class="font-body-sm text-body-sm text-outline hover:text-on-surface transition-colors duration-200" href="#">Terms of Service</a>
<a class="font-body-sm text-body-sm text-outline hover:text-on-surface transition-colors duration-200" href="#">Privacy Policy</a>
<a class="font-body-sm text-body-sm text-outline hover:text-on-surface transition-colors duration-200" href="#">Help Center</a>
</div>
</main>
</body></html>
